name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so --generate-notes has all commits

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          # Strip leading 'v': v0.0.1 в†’ 0.0.1
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore NrgOverlay.sln

      - name: Build & Publish (single-file, self-contained, win-x64)
        shell: bash
        run: |
          dotnet publish src/NrgOverlay.App/NrgOverlay.App.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version="${{ steps.ver.outputs.VERSION }}" \
            --output ./dist

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path   ./dist/* `
            -DestinationPath "NrgOverlay-${{ steps.ver.outputs.VERSION }}-win-x64.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            "NrgOverlay-${{ steps.ver.outputs.VERSION }}-win-x64.zip" \
            --title "NrgOverlay ${{ github.ref_name }}" \
            --generate-notes

