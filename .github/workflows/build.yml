name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SimOverlay.sln

      - name: Build
        run: dotnet build SimOverlay.sln --no-restore --configuration Release -warnaserror

      - name: Test
        run: dotnet test SimOverlay.sln --no-build --configuration Release
